name: fix-runtime
command: |
  curl -s -X POST "${WARPFIX_API_URL:-http://localhost:4000}/warp/command" \
    -H "Content-Type: application/json" \
    -d "{
      \"command\": \"fix-runtime\",
      \"api_key\": \"${WARPFIX_API_KEY}\",
      \"context\": {
        \"git_branch\": \"$(git branch --show-current 2>/dev/null)\",
        \"language\": \"$([ -f package.json ] && echo node || [ -f requirements.txt ] && echo python || echo unknown)\",
        \"runtime_version\": \"$(node -v 2>/dev/null || python3 --version 2>/dev/null || echo unknown)\",
        \"repo_url\": \"$(git remote get-url origin 2>/dev/null)\",
        \"cwd\": \"$(pwd)\"
      }
    }" | jq '.'
description: Fix runtime errors and crashes
tags:
  - runtime
  - repair
  - automation
source_url: https://github.com/bytepassperks/warpfix-intelligence-cloud
author: WarpFix
author_url: https://warpfix.dev
shells:
  - bash
  - zsh
