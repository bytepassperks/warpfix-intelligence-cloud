services:
  # Backend API
  - type: web
    name: warpfix-api
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: warpfix-redis
          property: connectionString
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: groq,github,hf,hffree
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: GITHUB_MODELS_MODEL
        value: openai/gpt-4o-mini
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY_FREE
        sync: false
      - key: HUGGINGFACE_API_URL
        value: https://router.huggingface.co/v1
      - key: HUGGINGFACE_MODEL
        value: Qwen/Qwen2.5-Coder-32B-Instruct
      - key: DODO_API_KEY
        sync: false
      - key: DODO_WEBHOOK_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /health

  # Frontend
  - type: web
    name: warpfix-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # Worker
  - type: worker
    name: warpfix-worker
    runtime: node
    plan: starter
    # NOTE: a clean Kotlin/Gradle (or large Maven) build needs ~0.5GB+ RAM and
    # OOM-kills this 512MB starter worker mid-sandbox, taking down Python/Node
    # repairs with it. So verified JVM repairs are intentionally OFF on the free
    # plan: the heavy build is gated behind SANDBOX_JVM_HEAVY (see
    # sandboxValidator.js) and JVM failures fall back to the unverified check
    # (fix generated, no auto-PR). To enable verified Kotlin/Java/Scala repairs,
    # move to a plan with ≳1GB RAM and add back the JDK install + JAVA_HOME +
    # GRADLE_USER_HOME below, and set SANDBOX_JVM_HEAVY=1:
    #   buildCommand: cd backend && npm install && bash scripts/install-jvm.sh
    #   JAVA_HOME=/opt/render/project/src/.jvm/jdk
    #   GRADLE_USER_HOME=/opt/render/project/src/.jvm/gradle-home
    #   SANDBOX_JVM_HEAVY=1
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/queue/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: warpfix-redis
          property: connectionString
      - key: LLM_PROVIDER
        value: groq,github,hf,hffree
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: GITHUB_MODELS_MODEL
        value: openai/gpt-4o-mini
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY_FREE
        sync: false
      - key: HUGGINGFACE_API_URL
        value: https://router.huggingface.co/v1
      - key: HUGGINGFACE_MODEL
        value: Qwen/Qwen2.5-Coder-32B-Instruct
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false

  # Redis Key-Value Store
  - type: keyvalue
    name: warpfix-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # Cron - Monthly usage reset
  - type: cron
    name: warpfix-cron-usage
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/cron/index.js usage-reset
    schedule: "0 0 1 * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString

  # Cron - Daily telemetry aggregation
  - type: cron
    name: warpfix-cron-telemetry
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/cron/index.js telemetry
    schedule: "0 2 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString

  # Cron - Weekly dependency radar
  - type: cron
    name: warpfix-cron-deps
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/cron/index.js dependency-radar
    schedule: "0 6 * * 0"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString

databases:
  - name: warpfix-db
    plan: basic-256mb
    databaseName: warpfix
    user: warpfix

